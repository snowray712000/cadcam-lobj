<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cadcam-lobj demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #eee; font-family: sans-serif; }
    #app { display: flex; height: 100vh; }
    #canvas-container { flex: 1; position: relative; }
    canvas { display: block; width: 100%; height: 100%; }
    #sidebar {
      width: 220px;
      padding: 16px;
      background: #16213e;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    h2 { font-size: 14px; color: #aaa; margin-bottom: 4px; }
    .group-item {
      padding: 6px 10px;
      border-radius: 4px;
      background: #0f3460;
      cursor: pointer;
      font-size: 13px;
      user-select: none;
    }
    .group-item:hover { background: #e94560; }
    .group-item.hidden { opacity: 0.4; }
    #drop-zone {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #aaa;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <div id="drop-zone">拖曳 .lobj 檔案至此，或按右側 Load</div>
    </div>
    <div id="sidebar">
      <h2>Groups</h2>
      <div id="group-list"></div>
      <hr style="border-color:#333; margin: 8px 0" />
      <input type="file" id="file-input" accept=".lobj,.obj" style="font-size:12px" />
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
